name: Custom — Sync upstream

# Per CLAUDE.md Rule 8:
#   - main is a pure mirror of upstream/main (fast-forward only).
#   - custom holds our customizations and merges main into it.
# This workflow runs on schedule and on demand. It updates main from
# QuantumNous/new-api, then attempts to merge main into custom. If the
# merge has conflicts, the workflow fails loudly so a human resolves it
# locally — we never force-push or commit conflict markers.

on:
  schedule:
    # Daily at 18:17 UTC (≈ 02:17 next-day Beijing time, off-peak).
    # Off-the-:00 minute on purpose to avoid the cron herd.
    - cron: '17 18 * * *'
  workflow_dispatch:
    inputs:
      merge_into_custom:
        description: 'Also merge main into custom (uncheck to only sync main)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: custom-sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    name: Sync main from upstream and merge into custom
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # We need write access via the default GITHUB_TOKEN for pushes.
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/QuantumNous/new-api.git
          git fetch upstream --prune
          git fetch origin --prune

      - name: Fast-forward main from upstream/main
        id: sync_main
        run: |
          set -euo pipefail
          git checkout main
          # Fast-forward only — refuse to merge if histories diverged
          # (which would mean someone wrote on main, violating Rule 8).
          if ! git merge --ff-only upstream/main; then
            echo "::error::main has diverged from upstream/main. Someone committed on main — fix per CLAUDE.md Rule 8."
            exit 1
          fi
          echo "behind_count=$(git rev-list --count HEAD..upstream/main)" >> "$GITHUB_OUTPUT"
          echo "ahead_count=$(git rev-list --count origin/main..HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push main
        run: git push origin main

      - name: Merge main into custom
        if: ${{ github.event_name == 'schedule' || inputs.merge_into_custom }}
        id: merge_custom
        run: |
          set -euo pipefail
          git checkout custom
          git pull --ff-only origin custom

          new_commits=$(git rev-list --count custom..main)
          echo "Commits in main not yet in custom: $new_commits"
          if [ "$new_commits" -eq 0 ]; then
            echo "Nothing to merge into custom."
            exit 0
          fi

          # Attempt automatic merge. On conflict: abort and fail loudly.
          if git merge --no-edit --no-ff main -m "chore(sync): merge upstream main into custom"; then
            git push origin custom
            echo "Merged $new_commits commits from main into custom."
          else
            echo "::error::Merge conflicts merging main into custom. Resolve locally:"
            echo "::error::  git checkout custom && git merge main"
            git merge --abort || true
            exit 1
          fi
